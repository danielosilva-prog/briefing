version: "3.9"

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: schoolreport-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-schoolreport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-schoolreport}
      POSTGRES_DB: ${POSTGRES_DB:-schoolreport}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-schoolreport}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - schoolreport-network

  # Redis for job queue
  redis:
    image: redis:7-alpine
    container_name: schoolreport-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - schoolreport-network

  # Database migrations
  migrations:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: schoolreport-migrations
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-schoolreport}:${POSTGRES_PASSWORD:-schoolreport}@postgres:5432/${POSTGRES_DB:-schoolreport}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - schoolreport-network

  # FastAPI application
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: schoolreport-api
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      DATABASE_URL: postgresql://${POSTGRES_USER:-schoolreport}:${POSTGRES_PASSWORD:-schoolreport}@postgres:5432/${POSTGRES_DB:-schoolreport}
      REDIS_URL: redis://redis:6379/0
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCS_BUCKET: ${GCS_BUCKET:-}
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials/gcp-credentials.json
    volumes:
      - ${GCP_CREDENTIALS_PATH:-./credentials}:/app/credentials:ro
      - report_output:/app/output
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - schoolreport-network

  # arq worker for background jobs
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: schoolreport-worker
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-schoolreport}:${POSTGRES_PASSWORD:-schoolreport}@postgres:5432/${POSTGRES_DB:-schoolreport}
      REDIS_URL: redis://redis:6379/0
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCS_BUCKET: ${GCS_BUCKET:-}
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials/gcp-credentials.json
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
    volumes:
      - ${GCP_CREDENTIALS_PATH:-./credentials}:/app/credentials:ro
      - report_output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    networks:
      - schoolreport-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  report_output:
    driver: local

networks:
  schoolreport-network:
    driver: bridge
