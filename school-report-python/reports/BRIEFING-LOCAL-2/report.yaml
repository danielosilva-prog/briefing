id: BRIEFING-LOCAL-2
name: Briefing Local por UF - Modelo 2
description: Briefing executivo gerado a partir de CSV ou planilha local, com formatacao baseada no modelo Word.
version: 0.1.0

parameters:
  - name: uf
    type: string
    required: true
    description: Sigla da UF que sera usada para selecionar a linha do arquivo de entrada
  - name: input_file
    type: string
    required: true
    description: Caminho para arquivo CSV, XLSX ou XLS com uma linha por UF

sources:
  bigquery:
    project: br-mec-segape

queries: []

charts: []

template:
  entry: template/main.typ
  assets: template/assets

cache:
  enabled: false
  ttl_days: 30
