id: ATS-02
name: Relatório Orçamentário - Aqui Tem Superior
description: Relatório de execução orçamentária de Instituições de Ensino Superior (IES) federais
version: 1.0.0
maintainer: SEGAPE
last_updated: "2026-02-04"

# Parameters - ATS-02 accepts institution identification
parameters:
  - name: id_uo
    type: string
    required: false
    description: ID da Unidade Orçamentária (opcional; se omitido, agrega todas as IES)
  - name: sigla
    type: string
    required: false
    description: Sigla da instituição (opcional; se omitida, usa "Brasil")

# No BigQuery queries for now - data will be provided via JSON
# Future: BigQuery queries will be added here
queries: []

# Chart types generated dynamically by the custom executor (charts.py):
# gauge, horizontal_bar, stacked_bar, grouped_bar, area_line
charts: []

# Data source configuration
sources:
  # Future: BigQuery integration when data is available
  # For now, data comes via JSON input
  json:
    enabled: true
    schema: data/schema.json

template:
  entry: template/main.typ

# Input validation
input:
  schema: data/schema.json
  required: true

# Cache disabled for dynamic budget data
cache:
  enabled: false

# Output configuration
output:
  filename_template: "ats02-{sigla}-{timestamp}.pdf"
  gcs_bucket: segape-reports
